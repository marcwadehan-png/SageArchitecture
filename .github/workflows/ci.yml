name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev] || pip install -e .

    - name: Run tests
      run: |
        pytest tests/ -v --cov=sageclaw --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 black mypy

    - name: Check code formatting with Black
      run: |
        black --check --diff sageclaw/

    - name: Run flake8
      run: |
        flake8 sageclaw/ --max-line-length=120 --extend-ignore=E203,W503 || echo "flake8 not configured, skipping"

    - name: Run pylint
      run: |
        pylint sageclaw/ --max-line-length=120 || echo "pylint not configured, skipping"

    - name: Run mypy
      run: |
        mypy sageclaw/ --ignore-missing-imports || echo "mypy not configured, skipping"

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install documentation tools
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material

    - name: Build documentation
      run: |
        mkdocs build --strict || echo "mkdocs not configured, documentation build skipped"

  validate-configs:
    name: Validate Claw Configurations
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install validation tools
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml

    - name: Validate YAML configurations
      run: |
        python -c "
        import yaml
        import os
        from pathlib import Path

        configs_dir = Path('sageclaw/configs')
        errors = []

        for yaml_file in configs_dir.glob('*.yaml'):
            try:
                with open(yaml_file, 'r', encoding='utf-8') as f:
                    yaml.safe_load(f)
            except Exception as e:
                errors.append(f'{yaml_file.name}: {str(e)}')

        if errors:
            print('Validation errors found:')
            for error in errors[:10]:  # Limit to first 10 errors
                print(f'  - {error}')
            exit(1)
        else:
            print(f'All {len(list(configs_dir.glob(\"*.yaml\")))} YAML files are valid!')
        "
